<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>udict</title>
  <style>
    html, body { margin:0; padding:0; height:100%; }
    iframe { width:100%; height:100%; border:0; display:block; }
  </style>
</head>
<body>
  <iframe id="app"></iframe>
  <script>
    const base = (window.udict && window.udict.base) || 'http://127.0.0.1:7219';
    const app = document.getElementById('app');
    app.src = base + '/';

    function sendToFrame(msg) {
      try { app.contentWindow && app.contentWindow.postMessage(msg, '*'); } catch (e) {}
    }

    let pending = null;
    let frameReady = false;

    function flushPending() {
      if (pending && frameReady) {
        sendToFrame({ type: 'udict-query', word: pending });
        pending = null;
      }
    }

    if (window.udict && window.udict.onEnter) {
      window.udict.onEnter(payload => {
        if (!payload) return;
        pending = payload;
        flushPending();
      });
    }

    window.addEventListener('message', e => {
      if (!e.data) return;
      if (e.data.type === 'udict-ready') {
        frameReady = true;
        flushPending();
        return;
      }
      if (e.data.type === 'udict-exit') {
        if (window.udict && window.udict.exit) window.udict.exit();
        return;
      }
      if (e.data.type === 'udict-pick-dir') {
        const picked = window.udict && window.udict.pickDirectory && window.udict.pickDirectory();
        if (picked) sendToFrame({ type: 'udict-dir-picked', path: picked });
      }
    });
  </script>
</body>
</html>
