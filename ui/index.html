<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="color-scheme" content="light"/>
  <title>udict</title>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>
  <aside id="sidebar">
    <div class="side-head">
      <span class="brand">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2 L13.2 8.5 L19.5 6 L15 11.3 L22 12 L15 12.7 L19.5 18 L13.2 15.5 L12 22 L10.8 15.5 L4.5 18 L9 12.7 L2 12 L9 11.3 L4.5 6 L10.8 8.5 Z"/>
        </svg>
        <span class="brand-name">udict</span>
      </span>
      <button id="side-toggle" title="折叠/展开侧栏">◀</button>
    </div>
    <div class="side-body">
      <div class="side-section">
        <div class="side-title">
          生词本
          <button id="wb-add" title="新建生词本">+</button>
        </div>
        <ul id="wordbooks" class="wb-list"></ul>
      </div>
      <div class="side-section">
        <div class="side-title">字号</div>
        <div class="font-ctrl">
          <button id="font-dec" title="缩小">A−</button>
          <span id="font-val">100%</span>
          <button id="font-inc" title="放大">A+</button>
          <button id="font-reset" title="重置">↺</button>
        </div>
      </div>
      <div class="side-section">
        <div class="side-title">词典</div>
        <ul id="dict-jump" class="dict-jump"><li class="muted">（查词后显示）</li></ul>
      </div>
      <div class="side-section">
        <div class="side-title">
          历史
          <button id="hist-clear" title="清空">✕</button>
        </div>
        <ul id="history" class="dict-jump"><li class="muted">（暂无）</li></ul>
      </div>
    </div>
  </aside>
  <main id="main">
    <div id="bar">
      <input id="q" type="text" placeholder="Type a word..." autocomplete="off" autofocus/>
      <button id="collect-btn" class="icon-btn" title="收录到生词本" type="button">
        <svg class="star-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><polygon points="12,2.5 14.9,9 22,9.6 16.5,14.4 18.3,21.5 12,17.7 5.7,21.5 7.5,14.4 2,9.6 9.1,9"/></svg>
        <svg class="star-filled" viewBox="0 0 24 24" fill="#EABE5A" stroke="#D9A842" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true"><polygon points="12,2.5 14.9,9 22,9.6 16.5,14.4 18.3,21.5 12,17.7 5.7,21.5 7.5,14.4 2,9.6 9.1,9"/></svg>
      </button>
      <a id="settings-link" href="settings.html" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
      <ul id="suggest"></ul>
    </div>
    <div id="results"></div>
    <div id="note-modal" class="modal" hidden>
      <div class="modal-card note-card">
        <div class="modal-head">
          <span class="modal-title">编辑备注</span>
          <button class="modal-close" id="note-close" title="关闭">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-word" id="note-word"></div>
          <textarea id="note-text" placeholder="输入备注..."></textarea>
        </div>
        <div class="modal-foot">
          <button id="note-confirm" class="primary">确认</button>
          <button id="note-cancel">取消</button>
        </div>
      </div>
    </div>
    <div id="collect-modal" class="modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <span class="modal-title">收录到生词本</span>
          <button class="modal-close" id="collect-close" title="关闭">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-word" id="collect-word"></div>
          <ul id="collect-books" class="collect-books"></ul>
        </div>
        <div class="modal-foot">
          <button id="collect-remove" class="danger">全部移除</button>
          <button id="collect-save" class="primary">保存</button>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
