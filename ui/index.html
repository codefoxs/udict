<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="color-scheme" content="light"/>
  <title>udict</title>
  <link rel="stylesheet" href="/app.css"/>
</head>
<body>
  <aside id="sidebar">
    <div class="side-head">
      <span>udict</span>
      <button id="side-toggle" title="折叠/展开侧栏">◀</button>
    </div>
    <div class="side-body">
      <div class="side-section">
        <div class="side-title">字号</div>
        <div class="font-ctrl">
          <button id="font-dec" title="缩小">A−</button>
          <span id="font-val">100%</span>
          <button id="font-inc" title="放大">A+</button>
          <button id="font-reset" title="重置">↺</button>
        </div>
      </div>
      <div class="side-section">
        <div class="side-title">词典</div>
        <ul id="dict-jump" class="dict-jump"><li class="muted">（查词后显示）</li></ul>
      </div>
      <div class="side-section">
        <div class="side-title">
          历史
          <button id="hist-clear" title="清空">✕</button>
        </div>
        <ul id="history" class="dict-jump"><li class="muted">（暂无）</li></ul>
      </div>
    </div>
  </aside>
  <main id="main">
    <div id="bar">
      <input id="q" type="text" placeholder="Type a word..." autocomplete="off" autofocus/>
      <a id="settings-link" href="/settings" title="Settings">⚙</a>
      <ul id="suggest"></ul>
    </div>
    <div id="results"></div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
